<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>小說創作素材與意象資料庫平台 - 故事廣場</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-container">
        <header>
            <img src="logo.png" alt="獨一無二的故事" class="logo">
            <nav>
                <ul>
                    <li><a href="index.html" class="active">首頁</a></li>
                    <li><a href="archive.html">意象分類</a></li>
                    <li><a href="characters.html">角色設定</a></li>
                    <li><a href="member.html">會員控制</a></li>
                    <li><a href="submit.html">投稿靈感</a></li>
                </ul>
            </nav>
        </header>
        
        <main>
            <h1 style="text-align: center;">ETCHED MEMORY 故事廣場</h1>
            <p style="text-align: center; color: #7f8c8d; margin-bottom: 30px;">
                歡迎來到靈感與意象的管理中心。下方為各個創作者公開分享的獨一無二故事片段：
            </p>
            
            <div id="public-wall" class="inspiration-list">
                <p style="text-align: center;">讀取雲端故事中...</p>
            </div>
        </main>

        <script>
            // === 雲端配置 ===
            const BIN_ID = "6a414d08f5f4af5e293dc97d"; 
            const API_KEY = "$2a$10$5Gqgl2.2muLPGwt0Gc1aDeA41/JaPd7Gn.rIs3i4C0W23aGu4bVby";

            window.onload = async function() {
                var publicWall = document.getElementById("public-wall");
                
                try {
                    // 從雲端抓取最新資料
                    const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                        headers: { 'X-Master-Key': API_KEY }
                    });
                    const json = await res.json();
                    let posts = json.record.posts || [];
                    
                    // 如果沒有資料，放入預設素材
                    if (posts.length === 0) {
                        posts = [
                            { title: "預設素材：遺留的記憶", text: "那段記憶既是希望，\n也是關於你留下的最後的痕跡。", author: "系統管理員" },
                            { title: "預設素材：神的惡作劇", text: "沒有東西是免費的，\n就算是神明給的也是。", author: "系統管理員" }
                        ];
                    }

                    var htmlContent = "";
                    // 反向顯示，讓最新的在上面
                    for (var i = posts.length - 1; i >= 0; i--) {
                        var formattedText = posts[i].text.replace(/\n/g, '<br>');
                        htmlContent += '<div class="inspiration-item">';
                        htmlContent += '<h4>' + (posts[i].title || "無標題") + ' <span style="font-size:12px; color:#e67e22; margin-left:10px;">✍️ 創作者: ' + (posts[i].author || "匿名") + '</span></h4>';
                        htmlContent += '<p>' + formattedText + '</p>';
                        htmlContent += '</div>';
                    }
                    publicWall.innerHTML = htmlContent;

                } catch (e) {
                    console.error("雲端讀取失敗:", e);
                    publicWall.innerHTML = "<p style='text-align:center; color:red;'>無法連線至雲端資料庫，請檢查網路。</p>";
                }
            };
        </script>

        <footer>&copy; 2026 小說創作素材與意象資料庫平台 - 期末作品呈現</footer>
    </div>
</body>
</html>
