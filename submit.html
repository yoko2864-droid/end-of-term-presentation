<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>投稿靈感 - 個人寫作後台與故事管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="main-container">
        <header>
            <nav><ul><li><a href="index.html">首頁</a></li><li><a href="submit.html" class="active">投稿靈感</a></li></ul></nav>
        </header>
        
        <main>
            <div id="lock-screen" style="text-align: center; padding: 40px 0;">
                <h2>⚠️ 尚未辨識創作者身份</h2>
                <a href="member.html"><button>前往會員控制台</button></a>
            </div>

            <div id="database-screen" style="display: none;">
                <h2>創作者後台：歡迎 <span id="user-display-name"></span> <span id="user-display-avatar"></span></h2>
                
                <div style="max-width: 600px; background: #fafafa; padding: 20px; border: 1px solid #e0e0e0;">
                    <h3>✨ 發佈新靈感素材</h3>
                    <input type="text" id="material-title" placeholder="標題">
                    <textarea id="material-text" rows="4" placeholder="內文"></textarea>
                    <button type="button" onclick="processSubmit()">發佈至雲端資料庫</button>
                </div>

                <div style="margin-top: 40px;">
                    <h3>📋 雲端故事總資料庫</h3>
                    <div id="admin-posts-list">讀取中...</div>
                </div>
            </div>
        </main>

        <script>
            // === 請填入你的資訊 ===
            const BIN_ID = "填入你的BIN_ID"; 
            const API_KEY = "$2a$10$5Gqgl2.2muLPGwt0Gc1aDeA41/JaPd7Gn.rIs3i4C0W23aGu4bVby";

            var userKey = sessionStorage.getItem("currentUser");
            var myNickname = "";
            var myAvatar = "";

            // 讀取雲端資料
            async function fetchFromCloud() {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const json = await res.json();
                return json.record || [];
            }

            // 儲存雲端資料
            async function saveToCloud(posts) {
                await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY
                    },
                    body: JSON.stringify(posts)
                });
            }

            window.onload = async function() {
                if (userKey) {
                    document.getElementById("lock-screen").style.display = "none";
                    document.getElementById("database-screen").style.display = "block";
                    
                    // 顯示用戶頭像 (處理圖片代碼)
                    var userDatabase = JSON.parse(localStorage.getItem("allUsers")) || {};
                    var myData = userDatabase[userKey] || { nickname: userKey, avatar: "👤" };
                    document.getElementById("user-display-name").innerText = myData.nickname;
                    
                    var avatarSpan = document.getElementById("user-display-avatar");
                    if (myData.avatar.startsWith("data:image")) {
                        avatarSpan.innerHTML = `<img src="${myData.avatar}" style="width:30px; height:30px; border-radius:50%; vertical-align:middle;">`;
                    } else {
                        avatarSpan.innerText = myData.avatar;
                    }
                    
                    renderPosts();
                }
            };

            async function renderPosts() {
                let posts = await fetchFromCloud();
                let listContainer = document.getElementById("admin-posts-list");
                listContainer.innerHTML = posts.map((post, i) => `
                    <div style="border-bottom:1px solid #ccc; padding:10px;">
                        <h4>${post.title}</h4><p>${post.text}</p>
                        <button onclick="deletePost(${i})">刪除</button>
                    </div>
                `).join('');
            }

            async function processSubmit() {
                let title = document.getElementById('material-title').value;
                let text = document.getElementById('material-text').value;
                let posts = await fetchFromCloud();
                posts.push({ title, text, author: userKey });
                await saveToCloud(posts);
                alert("已同步至雲端！");
                renderPosts();
            }

            async function deletePost(index) {
                let posts = await fetchFromCloud();
                posts.splice(index, 1);
                await saveToCloud(posts);
                renderPosts();
            }
        </script>
    </div>
</body>
</html>
